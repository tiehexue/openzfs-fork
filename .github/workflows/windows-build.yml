#
# This based on work that Andrew Innes <andrew.c12@gmail.com> did for OpenZFSonWindows,
# reworked for me to understand what it did, so I can support it myself.
# - Lundman
#

name: windows-build

on:
  push:
    branches:
      - zfs-Windows-*-release
    tags-ignore:
      - '*'
  pull_request:
    branches:
      - zfs-Windows-*-release
  workflow_dispatch:

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Enter MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout OpenZFS
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout OpenSSL
        uses: actions/checkout@v5
        with:
          repository: openzfsonwindows/openssl
          ref: openssl-3.5.5
          path: openssl

      - name: Create OpenZFS test signing certificate
        shell: pwsh
        run: |
          $certSubject = "OpenZFS Test Signing Certificate"
          $pfxPath = "$env:RUNNER_TEMP\openzfs-test-signing.pfx"
          $pfxPassword = "password123"
          $pwd = ConvertTo-SecureString $pfxPassword -AsPlainText -Force

          $cert = New-SelfSignedCertificate `
            -Subject "CN=$certSubject" `
            -Type CodeSigningCert `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -HashAlgorithm SHA256 `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -KeyExportPolicy Exportable `
            -NotAfter (Get-Date).AddDays(30)

          if (-not $cert) {
            throw "Failed to create test signing certificate"
          }

          Export-PfxCertificate `
            -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
            -FilePath $pfxPath `
            -Password $pwd | Out-Null

          if (-not (Test-Path $pfxPath)) {
            throw "Failed to export PFX"
          }

          "OPENZFS_SIGNTOOL_CERTSTORE=My" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENZFS_SIGNTOOL_CERTNAME=$certSubject" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENZFS_SIGNTOOL_SHA1=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENZFS_SIGNTOOL_TSA=http://timestamp.digicert.com" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENZFS_TEST_CERT_PFX=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENZFS_TEST_CERT_PASSWORD=$pfxPassword" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Created certificate:"
          Write-Host "  Subject:    $certSubject"
          Write-Host "  Store:      My"
          Write-Host "  Thumbprint: $($cert.Thumbprint)"
          Write-Host "  PFX:        $pfxPath"

      - name: Install WDK via NuGet
        shell: pwsh
        run: |
          nuget install Microsoft.Windows.WDK.x64 `
            -Version 10.0.26100.6584 `
            -OutputDirectory "${{ github.workspace }}\packages" `
            -Source https://api.nuget.org/v3/index.json

      - name: Set WDK and SDK roots
        shell: pwsh
        run: |
          $wdk = Get-ChildItem "${{ github.workspace }}\packages" -Directory |
            Where-Object { $_.Name -like "Microsoft.Windows.WDK.x64.*" } |
            Sort-Object Name -Descending |
            Select-Object -First 1
      
          $sdk = Get-ChildItem "${{ github.workspace }}\packages" -Directory |
            Where-Object { $_.Name -like "Microsoft.Windows.SDK.CPP.*" -and $_.Name -notlike "*.x64.*" } |
            Sort-Object Name -Descending |
            Select-Object -First 1
      
          if (-not $wdk) { throw "WDK package directory not found" }
          if (-not $sdk) { throw "SDK package directory not found" }
      
          $env:WDKContentRoot = Join-Path $wdk.FullName "c"
          $env:WINSDK_NUGET_ROOT = Join-Path $sdk.FullName "c"
      
          "WDKContentRoot=$env:WDKContentRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINSDK_NUGET_ROOT=$env:WINSDK_NUGET_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
      
          Write-Host "WDKContentRoot=$env:WDKContentRoot"
          Write-Host "WINSDK_NUGET_ROOT=$env:WINSDK_NUGET_ROOT"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -G "Ninja" `
            -B "${{ github.workspace }}/out/build/x64-Debug" `
            "${{ github.workspace }}" `
            -DOPENSSL_ROOT_DIR="${{ github.workspace }}/openssl" `
            -DOPENSSL_INCLUDE_DIR="${{ github.workspace }}/openssl/include/x64" `
            -DCRYPTO_STATIC_TEST="${{ github.workspace }}/openssl/lib/VC/x64/MTd/libcrypto_static.lib" `
            -DLIB_EAY_DEBUG="${{ github.workspace }}/openssl/lib/VC/x64/MTd/libcrypto_static.lib" `
            -DLIB_EAY_RELEASE="${{ github.workspace }}/openssl/lib/VC/x64/MT/libcrypto_static.lib" `
            -DSSL_EAY_DEBUG="${{ github.workspace }}/openssl/lib/VC/x64/MTd/libssl_static.lib" `
            -DSSL_EAY_RELEASE="${{ github.workspace }}/openssl/lib/VC/x64/MT/libssl_static.lib" `
            -DOPENZFS_SIGNTOOL_CERTSTORE="$env:OPENZFS_SIGNTOOL_CERTSTORE" `
            -DOPENZFS_SIGNTOOL_CERTNAME="$env:OPENZFS_SIGNTOOL_CERTNAME" `
            -DOPENZFS_SIGNTOOL_SHA1="$env:OPENZFS_SIGNTOOL_SHA1" `
            -DOPENZFS_SIGNTOOL_TSA="$env:OPENZFS_SIGNTOOL_TSA"

      - name: Build
        shell: pwsh
        run: |
          cmake --build "${{ github.workspace }}/out/build/x64-Debug" --parallel

      - name: Build Inno installer
        shell: pwsh
        working-directory: ${{ github.workspace }}\contrib\windows\Inno.Setup
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            .\ZFSInstall-debug.iss `
            "/Ssigntoolc=${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe sign /v /fd sha256 /sha1 $env:OPENZFS_SIGNTOOL_SHA1 /tr http://timestamp.digicert.com /td sha256 `$f" `
            | Tee-Object -FilePath "${{ github.workspace }}\iscc.log"

      - name: Find generated installer
        id: innoout
        shell: pwsh
        run: |
          $f = Get-ChildItem "${{ github.workspace }}\contrib\windows" -Filter *.exe -File |
               Sort-Object LastWriteTime -Descending |
               Select-Object -First 1
          if (-not $f) { throw "No installer EXE found" }
          "installer=$($f.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Installer: $($f.FullName)"

      - name: Trust generated test certificate for install
        shell: pwsh
        run: |
          $thepass = ConvertTo-SecureString "$env:OPENZFS_TEST_CERT_PASSWORD" -AsPlainText -Force
          Import-PfxCertificate -FilePath "$env:OPENZFS_TEST_CERT_PFX" -CertStoreLocation Cert:\LocalMachine\Root -Password $thepass | Out-Null
          Import-PfxCertificate -FilePath "$env:OPENZFS_TEST_CERT_PFX" -CertStoreLocation Cert:\LocalMachine\TrustedPublisher -Password $thepass | Out-Null

      - name: Show trusted OpenZFS certs
        shell: pwsh
        run: |
          Get-ChildItem Cert:\LocalMachine\Root | Where-Object Subject -like "*OpenZFS*" | Format-List Subject, Thumbprint
          Get-ChildItem Cert:\LocalMachine\TrustedPublisher | Where-Object Subject -like "*OpenZFS*" | Format-List Subject, Thumbprint

      - name: Install OpenZFS
        timeout-minutes: 5
        shell: pwsh
        run: |
          $log = "${{ github.workspace }}\InnoSetup-Install.log"
          $setupApi = "C:\Windows\INF\setupapi.dev.log"
          $exe = "${{ steps.innoout.outputs.installer }}"
       
          Write-Host "Starting installer"
          Write-Host "EXE: $exe"
          Write-Host "LOG: $log"
       
          $p = Start-Process `
            -FilePath $exe `
            -ArgumentList "/SP- /NORESTART /ALLUSERS /VERYSILENT /SUPPRESSMSGBOXES /LOG=`"$log`"" `
            -PassThru
       
          Write-Host "Installer PID: $($p.Id)"
       
          $deadline = (Get-Date).AddMinutes(3)
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 50
            try { $p.Refresh() } catch {}
       
            if ($p.HasExited) {
              Write-Host "Installer exited"
              Write-Host "Exit code: $($p.ExitCode)"
              break
            }
       
            Write-Host "Still running..."
            if (Test-Path $log) {
              Write-Host "==== Inno log tail ===="
              Get-Content $log -Tail 50
            }
            if (Test-Path $setupApi) {
              Write-Host "==== SetupAPI log tail ===="
              Select-String -Path $setupApi -Pattern "OpenZFS.inf","OpenZVOL.inf","ZFSInstaller","zfs" -Context 3,8
              Get-Process | Sort-Object ProcessName | Select-Object ProcessName, Id, CPU, WS, StartTime | Format-Table -AutoSize
            }
          }

          try { $p.Refresh() } catch {}
       
          if (-not $p.HasExited) {
            Write-Host "Installer timed out"
            Get-Process | Sort-Object ProcessName | Format-Table -AutoSize
       
            if (Test-Path $log) {
              Write-Host "==== Final Inno log tail ===="
              Get-Content $log -Tail 200
            } else {
              Write-Host "Installer log not found"
            }
       
            Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
            throw "Installer timed out"
          }
       
          if (Test-Path $log) {
            Write-Host "==== Final Inno log tail ===="
            Get-Content $log -Tail 200
          } else {
            Write-Host "Installer log not found"
          }
       
          if ($p.ExitCode -ne 0) {
            throw "Installer failed with exit code $($p.ExitCode)"
          }

      - name: Smoke test OpenZFS CLI
        shell: pwsh
        run: |
          $zpool = "C:\Program Files\OpenZFS On Windows\zpool.exe"
          $zfs   = "C:\Program Files\OpenZFS On Windows\zfs.exe"
      
          if (!(Test-Path $zpool)) { throw "zpool.exe not found" }
          if (!(Test-Path $zfs))   { throw "zfs.exe not found" }
      
          & $zpool version
          $zpoolExit = $LASTEXITCODE
          Write-Host "zpool exit code: $zpoolExit"
          if ($zpoolExit -ne 0) { throw "zpool version failed" }
      
          & $zfs version
          $zfsExit = $LASTEXITCODE
          Write-Host "zfs exit code: $zfsExit"
          if ($zfsExit -ne 0) { throw "zfs version failed" }
      
      - name: Upload installer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installer-logs-${{ github.run_number }}
          path: |
            ${{ github.workspace }}\iscc.log
            ${{ github.workspace }}\InnoSetup-Install.log
          if-no-files-found: warn

      - name: Upload SetupAPI log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setupapi-log-${{ github.run_number }}
          path: C:\Windows\INF\setupapi.dev.log
          if-no-files-found: warn

